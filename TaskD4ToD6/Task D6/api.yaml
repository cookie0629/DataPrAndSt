openapi: 3.0.3
info:
  title: D6
  description: D6 HOI task api
  version: 1.0.0

paths:

  /cities:
    get:
      tags: [Location]
      summary: Получить список всех городов
      operationId: listCities
      responses:
        "200":
          description: Список городов
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              example: ["Moscow", "Novosibirsk", "Kazan"]

  /cities/{city}/airports:
    get:
      tags: [Location]
      summary: Получить аэропорты в конкретном городе
      operationId: listCityAirports
      parameters:
        - name: city
          in: path
          required: true
          schema:
            type: string
          example: Moscow
      responses:
        "200":
          description: Список аэропортов города
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AirportBrief"
              example:
                - airport_code: VKO
                  airport_name: Vnukovo
                - airport_code: SVO
                  airport_name: Sheremetyevo

  /airports:
    get:
      tags: [Location]
      summary: Получить список всех аэропортов
      operationId: listAirports
      responses:
        "200":
          description: Код, название и город каждого аэропорта
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AirportFull"
              example:
                - airport_code: AAL
                  airport_name: Aalborg
                  city: Aalborg

  /airports/{code}/inbound:
    get:
      tags: [Location]
      summary: Прилетающие рейсы в аэропорт
      operationId: listInboundRoutes
      parameters:
        - $ref: "#/components/parameters/AirportCode"
        - $ref: "#/components/parameters/OriginFilter"
        - $ref: "#/components/parameters/TimeFrom"
        - $ref: "#/components/parameters/TimeTo"
        - $ref: "#/components/parameters/ResultLimit"
      responses:
        "200":
          description: Список входящих маршрутов (с учётом фильтров)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InboundRoute"
              example:
                - route_no: PG0063
                  days_of_week: [1, 3, 5]
                  scheduled_time: "01:15:00"
                  origin_airport: VKO
                  origin_city: Moscow
        "400":
          $ref: "#/components/responses/BadRequest"

  /airports/{code}/outbound:
    get:
      tags: [Location]
      summary: Вылетающие рейсы из аэропорта
      operationId: listOutboundRoutes
      parameters:
        - $ref: "#/components/parameters/AirportCode"
        - $ref: "#/components/parameters/DestinationFilter"
        - $ref: "#/components/parameters/TimeFrom"
        - $ref: "#/components/parameters/TimeTo"
        - $ref: "#/components/parameters/ResultLimit"
      responses:
        "200":
          description: Список исходящих маршрутов (с учётом фильтров)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OutboundRoute"
              example:
                - route_no: PG0064
                  days_of_week: [2, 4, 6]
                  scheduled_time: "08:30:00"
                  destination_airport: LED
                  destination_city: Saint Petersburg
        "400":
          $ref: "#/components/responses/BadRequest"

  /routes:
    get:
      tags: [Search]
      summary: Поиск маршрутов
      operationId: searchRoutes
      parameters:
        - name: from
          in: query
          required: true
          description: Город или код аэропорта вылета
          schema:
            type: string
        - name: to
          in: query
          required: true
          description: Город или код аэропорта прилета
          schema:
            type: string
        - name: date
          in: query
          required: true
          description: Дата вылета (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: connections
          in: query
          required: false
          description: Макс. число пересадок (или unbound)
          schema:
            type: string
            default: "0"
        - name: bookingClass
          in: query
          required: false
          description: Класс обслуживания
          schema:
            type: string
            enum: [economy, comfort, business]
      responses:
        "200":
          description: Список найденных вариантов перелета
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RouteOption"
        "400":
          $ref: "#/components/responses/BadRequest"

  /bookings:
    post:
      tags: [Booking]
      summary: Создать бронирование и билет
      operationId: createBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingRequest"
      responses:
        "201":
          description: Бронирование создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /check-in:
    post:
      tags: [Check-in]
      summary: Онлайн-регистрация (выбор места)
      operationId: checkIn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInRequest"
      responses:
        "201":
          description: Успешная регистрация
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BoardingPass"
        "200":
          description: Билет уже был зарегистрирован
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BoardingPass"
        "400":
          $ref: "#/components/responses/BadRequest"

components:
  parameters:
    AirportCode:
      name: code
      in: path
      required: true
      description: Код аэропорта (например, SVO)
      schema:
        type: string
        minLength: 3
        maxLength: 3
      example: SVO

    DestinationFilter:
      name: destination
      in: query
      required: false
      description: Фильтр по пункту назначения (код аэропорта IATA или название города)
      schema:
        type: string
      example: LED

    OriginFilter:
      name: origin
      in: query
      required: false
      description: Фильтр по аэропорту/городу вылета (для inbound)
      schema:
        type: string
      example: Moscow

    TimeFrom:
      name: time_from
      in: query
      required: false
      description: Начало диапазона по времени суток (HH:MM:SS)
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]$"
      example: "06:00:00"

    TimeTo:
      name: time_to
      in: query
      required: false
      description: Конец диапазона по времени суток (HH:MM:SS)
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]$"
      example: "18:00:00"

    ResultLimit:
      name: limit
      in: query
      required: false
      description: Максимальное число записей в ответе (по умолчанию 10, макс. 100)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10

  responses:
    BadRequest:
      description: Некорректные параметры запроса
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    AirportBrief:
      type: object
      properties:
        airport_code:
          type: string
        airport_name:
          type: string

    AirportFull:
      type: object
      properties:
        airport_code:
          type: string
        airport_name:
          type: string
        city:
          type: string

    InboundRoute:
      type: object
      properties:
        route_no:
          type: string
        days_of_week:
          type: array
          items:
            type: integer
        scheduled_time:
          type: string
        origin_airport:
          type: string
        origin_name:
          type: string
        origin_city:
          type: string

    OutboundRoute:
      type: object
      properties:
        route_no:
          type: string
        days_of_week:
          type: array
          items:
            type: integer
        scheduled_time:
          type: string
        destination_airport:
          type: string
        destination_name:
          type: string
        destination_city:
          type: string

    RouteOption:
      type: object
      properties:
        connectionsCount:
          type: integer
        segments:
          type: array
          items:
            type: object

    BookingRequest:
      type: object
      properties:
        passenger_id:
          type: string
        passenger_name:
          type: string
        fare_condition:
          type: string
          enum: [Economy, Comfort, Business]
        outbound:
          type: boolean
        segments:
          type: array
          items:
            type: object

    BookingResponse:
      type: object
      properties:
        book_ref:
          type: string
        ticket_no:
          type: string

    CheckInRequest:
      type: object
      properties:
        ticket_no:
          type: string

    BoardingPass:
      type: object
      properties:
        flightId:
          type: integer
        seatNo:
          type: string
        boardingNo:
          type: integer
        boardingTime:
          type: string
          format: date-time

# Task D5 - API 接口设计文档（OpenAPI 3.0 格式）
#
# 作用：在写代码之前，先把「前端要什么、后端返回什么」定死
# 这叫「接口契约」——前后端对着这份文档开发，不会各说各话
#
# 可用 Swagger Editor 打开预览：https://editor.swagger.io/
# D6 后端按本文档实现，路径和字段名必须一致

openapi: 3.0.0
info:
  title: D6
  description: D6 HOI task api
  version: 1.0.0

paths:

  # --- 城市模块：查有哪些城市、某城市有哪些机场 ---
  /cities:
    get:
      tags: [Location]
      summary: Получить список всех городов
      responses:
        200:
          description: Список городов
          content:
            application/json:
              example: ["Moscow", "Novosibirsk", "Kazan"]

  /cities/{city}/airports:
    get:
      tags: [Location]
      summary: Получить аэропорты в конкретном городе
      parameters:
        - name: city
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Список аэропортов города
          content:
            application/json:
              example:
                - airport_code: "VKO"
                  airport_name: "Vnukovo"
                - airport_code: "SVO"
                  airport_name: "Sheremetyevo"

  # --- 机场模块：查所有机场、某机场的进港/出港航线 ---
  /airports:
    get:
      tags: [Location]
      summary: Получить список всех аэропортов
      responses:
        200:
          description: Код, название и город каждого аэропорта
          content:
            application/json:
              example:
                - airport_code: "AAL"
                  airport_name: "Aalborg"
                  city: "Aalborg"

  /airports/{code}/inbound:
    get:
      tags: [Location]
      summary: Прилетающие рейсы в аэропорт
      parameters:
        - name: code
          in: path
          required: true
          description: Код аэропорта (например, SVO)
          schema:
            type: string
      responses:
        200:
          description: Список входящих маршрутов
          content:
            application/json:
              example:
                - route_no: "PG0063"
                  days_of_week: [1, 3, 5]
                  scheduled_time: "01:15:00"
                  origin_airport: "VKO"
                  origin_city: "Moscow"

  /airports/{code}/outbound:
    get:
      tags: [Location]
      summary: Вылетающие рейсы из аэропорта
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Список исходящих маршрутов
          content:
            application/json:
              example:
                - route_no: "PG0064"
                  days_of_week: [2, 4, 6]
                  scheduled_time: "01:15:00"
                  destination_airport: "VKO"
                  destination_city: "Moscow"

  # --- 航线搜索：核心功能，支持直飞和中转 ---
  /routes:
    get:
      tags: [Search]
      summary: Поиск маршрутов
      parameters:
        - name: from
          in: query
          required: true
          description: Город или код аэропорта вылета
          schema:
            type: string
        - name: to
          in: query
          required: true
          description: Город или код аэропорта прилета
          schema:
            type: string
        - name: date
          in: query
          required: true
          description: Дата вылета (YYYY-MM-DD)
          schema:
            type: string
        - name: connections
          in: query
          required: false
          description: Макс. число пересадок (или "unbound")
          schema:
            type: string
            default: "0"
        - name: bookingClass
          in: query
          required: false
          description: Класс обслуживания
          schema:
            type: string
            enum: [economy, comfort, business]
      responses:
        200:
          description: Список найденных вариантов перелета
          content:
            application/json:
              example:
                - connectionsCount: 0
                  segments:
                    - arrivalAirportCode: "LED"
                      arrivalTime: "2025-12-31T23:45:00+00:00"
                      departureAirportCode: "VKO"
                      departureTime: "2025-12-31T22:30:00+00:00"
                      routeNo: "PG0063"

  # --- 订票：传入乘客信息和多段行程，返回预订号和票号 ---
  /bookings:
    post:
      tags: [Booking]
      summary: Создать бронирование и билет
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                passenger_id:
                  type: string
                  example: "1234 567890"
                passenger_name:
                  type: string
                  example: "IVAN IVANOV"
                fare_condition:
                  type: string
                  enum: [Economy, Comfort, Business]
                  default: Economy
                outbound:
                  type: boolean
                  default: true
                segments:
                  type: array
                  items:
                    type: object
                    properties:
                      routeNo:
                        type: string
                      departureAirportCode:
                        type: string
                      arrivalAirportCode:
                        type: string
                      departureTime:
                        type: string
                        format: date-time
      responses:
        201:
          description: Бронирование создано
          content:
            application/json:
              example:
                book_ref: "ABC123"
                ticket_no: "0005431234567"
        400:
          description: Ошибка в данных

  # --- 值机：只需票号，后端自动分配座位并返回登机牌 ---
  /check-in:
    post:
      tags: [Check-in]
      summary: Онлайн-регистрация (выбор места)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ticket_no:
                  type: string
                  example: "0005431234567"
      responses:
        201:
          description: Успешная регистрация (возвращает посадочные)
          content:
            application/json:
              example:
                - boardingNo: 1
                  boardingTime: "2025-12-31T22:00:00Z"
                  flightId: 5714
                  seatNo: "12A"
        200:
          description: Билет уже был зарегистрирован
        400:
          description: Не указан номер билета
